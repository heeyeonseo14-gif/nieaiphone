<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Your World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:
linear-gradient(
180deg,
#EEE5FF,
#DED1F8,
#CAB5EA
);

}

/* 云 */

body::before{

content:"";

position:fixed;

inset:-30%;

background:

radial-gradient(
circle,
rgba(255,255,255,.45),
transparent 65%
);

filter:blur(140px);

animation:
cloud
18s infinite alternate;

}

@keyframes cloud{

from{

transform:
translate(-5%,0);

}

to{

transform:
translate(5%,5%);

}

}

/* 页面 */

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

align-items:center;

}

/* 锁屏 */

#lock{

padding-top:120px;

color:white;

}

.time{

font-size:90px;

font-weight:200;

}

.date{

font-size:18px;

opacity:.85;

}

.lock-card{

margin-top:90px;

width:86%;

height:250px;

border-radius:40px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:
blur(30px);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.lock-title{

font-size:32px;

}

.lock-text{

margin-top:10px;

opacity:.8;

}

.unlock{

margin-top:auto;

margin-bottom:70px;

color:white;

}

/* 创建世界 */

#create{

display:none;

justify-content:center;

padding-top:170px;

}

.box{

width:86%;

padding:32px;

border-radius:38px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:
blur(30px);

}

.title{

color:white;

font-size:30px;

}

.sub{

color:white;

opacity:.8;

margin:

8px
0
26px;

}

.input{

width:100%;

padding:18px;

margin-bottom:14px;

border:none;

outline:none;

border-radius:18px;

background:

rgba(
255,
255,
255,
.45
);

}

.btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:16px;

}

/* 主页 */

#home{

display:none;

justify-content:center;

align-items:center;

color:white;

font-size:26px;

}

</style>

</head>

<body>



<!-- 锁屏 -->

<div
class="page"
id="lock">

<div
class="time"
id="clock">

16:32

</div>

<div
class="date">

星期日

</div>


<div
class="lock-card">

<div
class="lock-title">

欢迎回来

</div>

<div
class="lock-text">

轻触进入你的世界

</div>

</div>


<div
class="unlock">

↑ 点击继续

</div>

</div>



<!-- 创建世界 -->

<div
class="page"
id="create">

<div
class="box">

<div
class="title">

创建你的世界

</div>

<div
class="sub">

每一个名字，
都会开启独属于你的故事。

</div>


<input

class="input"

id="name"

placeholder="用户名">


<input

class="input"

id="password"

type="password"

placeholder="密码">


<button
class="btn"
onclick="createWorld()">

开始旅程

</button>

</div>

</div>



<!-- 主页 -->

<div
class="page"
id="home">

欢迎进入主页

</div>



<script>

/* 时间 */

function time(){

clock.innerText=

new Date()

.toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
)

}

time()

setInterval(
time,
1000
)


/* 解锁 */

lock.onclick=

function(){

lock.style.display=
"none"

create.style.display=
"flex"

}


/* 创建账号 */

function createWorld(){

let user=

name.value

let pass=

password.value


if(
!user||
!pass
){

alert(
"请输入用户名和密码"
)

return

}


localStorage.setItem(

"user",

user

)

localStorage.setItem(

"pass",

pass

)


create.style.display=
"none"

home.style.display=
"flex"

home.innerHTML=

`
欢迎回来<br><br>
${user}
`

}

</script>

</body>

</html>
