<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Your World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:
linear-gradient(
180deg,
#EADFFF,
#DCCDF6,
#C6B2E8
);

}

/* 云层 */

body::before{

content:"";

position:fixed;

width:140%;
height:140%;

background:

radial-gradient(
circle,
rgba(255,255,255,.65),
transparent 60%
);

filter:blur(90px);

animation:
cloud 25s linear infinite;

}

@keyframes cloud{

0%{
transform:
translateX(-10%);
}

100%{
transform:
translateX(10%);
}

}

/* 页面 */

.page{

position:absolute;

width:100%;
height:100%;

display:flex;

flex-direction:column;

align-items:center;

transition:.45s;

}

/* 锁屏 */

#lock{

padding-top:90px;

color:white;

}

.time{

font-size:78px;

font-weight:200;

}

.date{

margin-top:-10px;

opacity:.8;

}

.card{

margin-top:60px;

width:88%;

height:260px;

border-radius:36px;

background:
rgba(255,255,255,.18);

backdrop-filter:
blur(24px);

border:
1px solid rgba(255,255,255,.25);

}

.unlock{

margin-top:auto;

margin-bottom:70px;

opacity:.9;

}

/* 登录 */

#login{

justify-content:center;

display:none;

}

.login-box{

width:86%;

padding:30px;

border-radius:36px;

background:
rgba(255,255,255,.2);

backdrop-filter:
blur(24px);

}

.title{

font-size:30px;

margin-bottom:10px;

color:white;

}

.sub{

font-size:14px;

color:white;

opacity:.8;

margin-bottom:30px;

}

input{

width:100%;

padding:18px;

margin-bottom:16px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,.5);

outline:none;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:

rgba(255,255,255,.8);

font-size:16px;

}

/* 主页 */

#home{

display:none;

justify-content:center;

align-items:center;

color:white;

font-size:28px;

}

</style>

</head>

<body>

<!-- 锁屏 -->

<div id="lock" class="page">

<div class="time" id="time"></div>

<div class="date">
星期日
</div>

<div class="card">
</div>

<div class="unlock">

↑ 点击解锁

</div>

</div>


<!-- 登录 -->

<div id="login" class="page">

<div class="login-box">

<div class="title">

欢迎回来

</div>

<div class="sub">

登录进入你的世界

</div>

<input
id="user"
placeholder="账号"
>

<input
id="pass"
type="password"
placeholder="密码"
>

<button onclick="login()">

登录

</button>

</div>

</div>


<!-- 主页 -->

<div id="home" class="page">

主页（之后做）

</div>


<script>

/* 时间 */

function time(){

let now=
new Date()

document
.getElementById("time")
.innerText=

now.toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
)

}

time()

setInterval(
time,
1000
)

/* 解锁 */

document
.getElementById("lock")
.onclick=

function(){

lock.style.opacity=0

setTimeout(()=>{

lock.style.display="none"

login.style.display="flex"

},300)

}

/* 登录 */

function login(){

let u=
user.value

let p=
pass.value

if(
u &&
p
){

login.style.display="none"

home.style.display="flex"

}

else{

alert(
"请输入账号和密码"
)

}

}

</script>

</body>

</html>
