<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Your World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
-apple-system,
BlinkMacSystemFont,
sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,
#EEE6FF,
#DCCEF7,
#CBB6EA
);

}

/* 云 */

body::before{

content:"";

position:fixed;

width:140%;
height:140%;

left:-20%;

top:-20%;

background:

radial-gradient(
circle,
rgba(255,255,255,.5),
transparent 60%
);

filter:
blur(120px);

animation:
cloud 18s infinite alternate;

}

@keyframes cloud{

from{

transform:
translate(
-5%,
0
);

}

to{

transform:
translate(
5%,
4%
);

}

}

/* 页面 */

.page{

position:absolute;

width:100%;
height:100%;

display:flex;

flex-direction:column;

align-items:center;

transition:.5s;

}

/* 锁屏 */

#lock{

padding-top:120px;

color:white;

}

.time{

font-size:90px;

font-weight:200;

}

.date{

font-size:18px;

opacity:.9;

}

.lock-card{

margin-top:90px;

width:86%;

height:260px;

border-radius:40px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(30px);

border:

1px solid
rgba(
255,
255,
255,
.25
);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.lock-title{

font-size:32px;

margin-bottom:12px;

}

.lock-text{

font-size:16px;

opacity:.8;

}

.unlock{

margin-top:auto;

margin-bottom:70px;

color:white;

opacity:.9;

}

/* 登录 */

#login{

display:none;

justify-content:center;

}

.login-box{

margin-top:180px;

width:86%;

padding:32px;

border-radius:40px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(30px);

border:

1px solid
rgba(
255,
255,
255,
.25
);

}

.login-title{

color:white;

font-size:30px;

margin-bottom:8px;

}

.login-sub{

color:white;

opacity:.75;

margin-bottom:28px;

}

.input{

width:100%;

padding:18px;

margin-bottom:14px;

border:none;

border-radius:20px;

background:

rgba(
255,
255,
255,
.45
);

outline:none;

font-size:16px;

}

.btn{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:

rgba(
255,
255,
255,
.8
);

font-size:16px;

}

/* 主页 */

#home{

display:none;

justify-content:center;

align-items:center;

color:white;

font-size:32px;

}

</style>

</head>

<body>


<!-- 锁屏 -->

<div
class="page"
id="lock">

<div
class="time"
id="time">
16:52
</div>

<div
class="date">

星期日

</div>


<div
class="lock-card">

<div
class="lock-title">

欢迎回来

</div>

<div
class="lock-text">

轻触进入你的世界

</div>

</div>


<div
class="unlock">

↑ 点击解锁

</div>

</div>



<!-- 登录 -->

<div
class="page"
id="login">

<div
class="login-box">

<div
class="login-title">

登录

</div>

<div
class="login-sub">

继续你的旅程

</div>


<input

class="input"

id="user"

placeholder="账号">

<input

class="input"

type="password"

id="pass"

placeholder="密码">


<button
class="btn"
onclick="login()">

进入

</button>

</div>

</div>



<!-- 主页 -->

<div
class="page"
id="home">

主页（下一步做）

</div>



<script>

/* 时间 */

function update(){

let now=
new Date()

let time=

now.toLocaleTimeString(
[],
{
hour:"2-digit",
minute:"2-digit"
}
)

document
.getElementById(
"time"
)
.innerText=

time

}

update()

setInterval(
update,
1000
)



/* 解锁 */

lock.onclick=

()=>{

lock.style.opacity=0

setTimeout(()=>{

lock.style.display=
"none"

login.style.display=
"flex"

},300)

}



/* 登录 */

function login(){

let u=
user.value

let p=
pass.value

if(
u &&
p
){

login.style.display=
"none"

home.style.display=
"flex"

}

else{

alert(
"请输入账号和密码"
)

}

}

</script>

</body>

</html>
