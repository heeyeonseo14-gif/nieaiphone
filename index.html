<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>YaNie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:

"Trebuchet MS",
sans-serif;

}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,
#F3EDFF,
#E5D9FA,
#D5C1F2
);

}

/* 云 */

body::before{

content:"";

position:fixed;

inset:-30%;

background:

radial-gradient(
circle,
rgba(255,255,255,.55),
transparent 65%
);

filter:
blur(160px);

animation:
cloud
16s
infinite
alternate;

}

@keyframes cloud{

from{

transform:
translate(
-5%,
0
);

}

to{

transform:
translate(
5%,
6%
);

}

}

/* 页面 */

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

align-items:center;

}

/* 锁屏 */

#lock{

padding-top:110px;

color:white;

}

/* 时间 */

.time{

font-size:64px;

font-weight:600;

letter-spacing:-2px;

color:#FFF8FC;

text-shadow:

0 4px 20px
rgba(
255,
255,
255,
.22
);

font-family:

"Georgia",
"Trebuchet MS",
sans-serif;

}

/* 日期 */

.date{

margin-top:6px;

font-size:16px;

letter-spacing:2px;

color:

#F7F0FF;

opacity:.72;

font-family:

"Trebuchet MS";

}
  
/* 卡片 */

.lock-card{

margin-top:55px;

width:84%;

height:240px;

border-radius:42px;

/* 真玻璃 */

background:

linear-gradient(

135deg,

rgba(
255,
255,
255,
.18
),

rgba(
255,
255,
255,
.06
)

);

backdrop-filter:

blur(40px)

saturate(170%);

-webkit-backdrop-filter:

blur(40px)

saturate(170%);

/* 边缘高光 */

border:

1px solid

rgba(
255,
255,
255,
.28
);

/* 外阴影 */

box-shadow:

0 20px 60px
rgba(
175,
145,
225,
.12),

0 0 0 1px
rgba(
255,
255,
255,
.08)

/* 内高光 */
,

inset

0 1px 1px

rgba(
255,
255,
255,
.55)

,

inset

0 -10px 40px

rgba(
255,
255,
255,
.05);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

overflow:hidden;

position:relative;

}

/* 玻璃反光 */

.lock-card::before{

content:"";

position:absolute;

top:-80%;

left:-60%;

width:120%;

height:220%;

background:

linear-gradient(

90deg,

transparent,

rgba(
255,
255,
255,
.18
),

transparent

);

transform:

rotate(
25deg
);

}
  
/* 标题 */

.lock-title{

font-size:22px;

font-weight:700;

color:

#FFFDFE;

text-shadow:

0 4px 18px
rgba(
255,
255,
255,
.25
);

z-index:3;

}

/* 副标题 */

.lock-text{

margin-top:18px;

font-size:34px;

font-weight:500;

color:

#FFFFFF;

opacity:.98;

text-shadow:

0 6px 26px
rgba(
255,
255,
255,
.22
);

z-index:3;

}


/* 底部 */

.unlock{

margin-top:auto;

margin-bottom:90px;

font-size:15px;

letter-spacing:2px;

color:

#F6EDFF;

opacity:.8;

}

</style>

</head>

<body>


<div
class="page"
id="lock">

<div
class="time"
id="clock">

16:32

</div>


<div
class="date">

星期日

</div>



<div
class="lock-card">

<div
class="lock-title">

欢迎进入你的世界

</div>

<div
class="lock-text">

YaNie

</div>

</div>



<div
class="unlock">

↑ 点击继续

</div>

</div>



<script>

/* 时间 */

function updateClock(){

clock.innerText=

new Date()

.toLocaleTimeString(
[],
{
hour:
"2-digit",

minute:
"2-digit"
}

)

}

updateClock()

setInterval(
updateClock,
1000
)


/* 进入主页 */

document
.getElementById(
"lock"
)

.addEventListener(

"click",

function(){

window.location.href=

"home.html"

}

)

</script>

</body>

</html>
