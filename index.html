<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>YaNie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:

"Trebuchet MS",
sans-serif;

}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,
#F3EDFF,
#E5D9FA,
#D5C1F2
);

}

/* 云 */

body::before{

content:"";

position:fixed;

inset:-30%;

background:

radial-gradient(
circle,
rgba(255,255,255,.55),
transparent 65%
);

filter:
blur(160px);

animation:
cloud
16s
infinite
alternate;

}

@keyframes cloud{

from{

transform:
translate(
-5%,
0
);

}

to{

transform:
translate(
5%,
6%
);

}

}

/* 页面 */

.page{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

align-items:center;

}

/* 锁屏 */

#lock{

padding-top:110px;

color:white;

}

/* 时间 */

.time{

font-size:64px;

font-weight:600;

letter-spacing:-2px;

color:#FFF8FC;

text-shadow:

0 4px 20px
rgba(
255,
255,
255,
.22
);

font-family:

"Georgia",
"Trebuchet MS",
sans-serif;

}

/* 日期 */

.date{

margin-top:6px;

font-size:16px;

letter-spacing:2px;

color:

#F7F0FF;

opacity:.72;

font-family:

"Trebuchet MS";

}
  
/* 卡片 */

.lock-card{

margin-top:55px;

width:84%;

height:240px;

border-radius:42px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:
blur(28px);

border:

1px solid
rgba(
255,
255,
255,
.2
);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

/* 标题 */

.lock-title{

font-size:22px;

font-weight:700;

line-height:1.6;

color:

#FFF7FD;

letter-spacing:1px;

font-family:

"Georgia";

}

/* 副标题 */

.lock-text{

margin-top:18px;

font-size:32px;

font-weight:600;

letter-spacing:4px;

color:

#FFFFFF;

opacity:.95;

font-family:

"Cursive";

}


/* 底部 */

.unlock{

margin-top:auto;

margin-bottom:90px;

font-size:15px;

letter-spacing:2px;

color:

#F6EDFF;

opacity:.8;

}

</style>

</head>

<body>


<div
class="page"
id="lock">

<div
class="time"
id="clock">

16:32

</div>


<div
class="date">

星期日

</div>



<div
class="lock-card">

<div
class="lock-title">

欢迎进入你的世界

</div>

<div
class="lock-text">

YaNie

</div>

</div>



<div
class="unlock">

↑ 点击继续

</div>

</div>



<script>

/* 时间 */

function updateClock(){

clock.innerText=

new Date()

.toLocaleTimeString(
[],
{
hour:
"2-digit",

minute:
"2-digit"
}

)

}

updateClock()

setInterval(
updateClock,
1000
)


/* 进入主页 */

document
.getElementById(
"lock"
)

.addEventListener(

"click",

function(){

window.location.href=

"home.html"

}

)

</script>

</body>

</html>
