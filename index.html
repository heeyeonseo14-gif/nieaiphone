
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Your World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
-apple-system,
sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,
#EEE5FF,
#DED0F7,
#C8B4EA
);

}

/* 云背景 */

body::before{

content:"";

position:fixed;

inset:-20%;

background:

radial-gradient(
circle,
rgba(255,255,255,.5),
transparent 65%
);

filter:blur(120px);

animation:
floatCloud
18s
infinite
alternate;

}

@keyframes floatCloud{

from{

transform:
translate(
-4%,
0
);

}

to{

transform:
translate(
4%,
5%
);

}

}

/* 页面 */

.screen{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

align-items:center;

transition:.4s;

}

/* 锁屏 */

#lock{

padding-top:120px;

color:white;

z-index:2;

}

.time{

font-size:92px;

font-weight:200;

}

.date{

font-size:18px;

opacity:.9;

}

.lock-card{

margin-top:90px;

width:86%;

height:250px;

border-radius:38px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(28px);

border:

1px solid
rgba(
255,
255,
255,
.25
);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.lock-title{

font-size:34px;

}

.lock-text{

margin-top:12px;

opacity:.8;

}

.unlock{

margin-top:auto;

margin-bottom:70px;

opacity:.9;

}

/* 登录 */

#login{

display:none;

justify-content:center;

padding-top:170px;

}

.login-box{

width:86%;

padding:30px;

border-radius:38px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(28px);

border:

1px solid
rgba(
255,
255,
255,
.25
);

}

.login-title{

color:white;

font-size:30px;

margin-bottom:8px;

}

.login-sub{

color:white;

opacity:.8;

margin-bottom:26px;

}

.input{

width:100%;

padding:18px;

margin-bottom:14px;

border:none;

outline:none;

border-radius:20px;

background:

rgba(
255,
255,
255,
.45
);

font-size:16px;

}

.button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

font-size:16px;

background:

white;

}

/* 主页 */

#home{

display:none;

justify-content:center;

align-items:center;

color:white;

font-size:32px;

}

</style>

</head>

<body>


<!-- 锁屏 -->

<div
class="screen"
id="lock">

<div
class="time"
id="clock">
16:55
</div>

<div
class="date">

星期日

</div>


<div
class="lock-card">

<div
class="lock-title">

欢迎回来

</div>

<div
class="lock-text">

轻触进入你的世界

</div>

</div>


<div
class="unlock">

↑ 点击解锁

</div>

</div>



<!-- 登录 -->

<div
class="screen"
id="login">

<div
class="login-box">

<div
class="login-title">

登录

</div>

<div
class="login-sub">

继续你的旅程

</div>

<input
class="input"
id="username"
placeholder="账号">

<input
class="input"
id="password"
type="password"
placeholder="密码">

<button
class="button"
onclick="goHome()">

进入

</button>

</div>

</div>



<!-- 主页 -->

<div
class="screen"
id="home">

主页（下一步做）

</div>


<script>

/* 时间 */

function clock(){

let now=

new Date()

document
.getElementById(
"clock"
)

.innerHTML=

now.toLocaleTimeString(
[],
{
hour:
"2-digit",

minute:
"2-digit"
}

)

}

clock()

setInterval(
clock,
1000
)


/* 解锁 */

document
.getElementById(
"lock"
)

.addEventListener(
"click",

function(){

this.style.display=
"none"

document
.getElementById(
"login"
)

.style.display=
"flex"

}

)


/* 登录 */

function goHome(){

let u=

document
.getElementById(
"username"
)

.value

let p=

document
.getElementById(
"password"
)

.value


if(
u
&&
p
){

document
.getElementById(
"login"
)

.style.display=
"none"


document
.getElementById(
"home"
)

.style.display=
"flex"

}

else{

alert(
"请输入账号密码"
)

}

}

</script>

</body>

</html>
