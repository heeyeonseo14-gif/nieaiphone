<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Your Life</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Trebuchet MS",
sans-serif;
}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,
#F5EEFF,
#E6D8FA,
#D8C2F3
);

padding:22px;

}

/* 顶部 */

.header{

display:flex;

justify-content:
space-between;

align-items:center;

}

.title{

font-size:34px;

color:

#4D4460;

}

.add{

width:42px;

height:42px;

border:none;

border-radius:50%;

background:

rgba(
255,
255,
255,
.22
);

backdrop-filter:

blur(30px);

font-size:26px;

color:

#4A4257;

}

/* 内容 */

.content{

margin-top:26px;

height:

calc(
100vh - 220px
);

overflow:auto;

}

.section{

display:none;

}

.show{

display:block;

}

/* 空 */

.empty{

margin-top:120px;

text-align:center;

color:

#746A85;

}

/* 设置 */

.role{

display:flex;

align-items:center;

margin-bottom:14px;

padding:16px;

border-radius:28px;

background:

rgba(
255,
255,
255,
.18
);

}

.role img{

width:56px;

height:56px;

border-radius:50%;

object-fit:cover;

}

.role-info{

margin-left:14px;

}

.role-name{

font-size:18px;

color:

#4A4257;

}

.role-gender{

margin-top:6px;

font-size:14px;

color:

#7A7288;

}

/* 底栏 */

.tab{

position:fixed;

bottom:20px;

left:20px;

right:20px;

height:80px;

border-radius:34px;

background:

rgba(
255,
255,
255,
.2
);

backdrop-filter:

blur(40px);

display:flex;

justify-content:
space-around;

align-items:center;

}

.item{

border:none;

background:none;

color:

#746A85;

}

.active{

color:

#4A4257;

font-weight:700;

}

/* 弹窗 */

.modal{

position:fixed;

inset:0;

display:none;

justify-content:center;

align-items:center;

background:

rgba(
0,
0,
0,
.2
);

}

.form{

width:88%;

max-height:80vh;

overflow:auto;

padding:24px;

border-radius:34px;

background:

rgba(
255,
255,
255,
.75
);

}

.input{

width:100%;

padding:16px;

margin-top:12px;

border:none;

border-radius:18px;

background:

#FFFFFF;

}

.save{

margin-top:18px;

width:100%;

padding:16px;

border:none;

border-radius:20px;

background:

#4A4257;

color:white;

}

.preview{

width:90px;

height:90px;

border-radius:50%;

background:

#EEE;

margin:auto;

overflow:hidden;

}

.preview img{

width:100%;

height:100%;

object-fit:cover;

}

/* 开启故事 */

.new-story{

display:flex;

justify-content:
space-between;

align-items:center;

padding:22px;

margin-bottom:18px;

border-radius:30px;

background:

linear-gradient(

135deg,

rgba(
255,
255,
255,
.25
),

rgba(
255,
255,
255,
.08
)

);

backdrop-filter:

blur(40px);

color:

#4D4460;

font-size:18px;

}

/* 故事 */

.story{

padding:18px;

margin-bottom:14px;

border-radius:28px;

background:

rgba(
255,
255,
255,
.18
);

}

.story-name{

font-size:18px;

color:

#4A4257;

}

.story-sub{

margin-top:8px;

font-size:14px;

color:

#7A7288;

} 

</style>

</head>

<body>



<div class="header">

<div class="title">

Your Life

</div>

<button
class="add"

onclick="openCreate()">

＋

</button>

</div>



<div class="content">


<div
id="now"

class="section show">


<!-- 固定入口 -->

<div
class="new-story"

onclick="createStory()">

<div>

开启新故事

</div>

<div>

＋

</div>

</div>



<!-- 故事列表 -->

<div
id="storyList">

<div
class="empty">

还没有故事

</div>

</div>


</div>

  

<div
id="status"

class="section">

<div class="empty">

状态施工中

</div>

</div>



<div
id="setting"

class="section">

<div id="roles">

</div>

</div>


</div>



<div class="tab">

<button
class="item active"

onclick="tab('now',this)">

当下

</button>


<button
class="item"

onclick="tab('status',this)">

状态

</button>


<button
class="item"

onclick="tab('setting',this)">

设置

</button>

</div>



<div
class="modal"

id="modal">

<div class="form">


<div class="preview">

<img
id="photo">

</div>


<input
type="file"
accept="image/*"

onchange="upload(event)">



<input
class="input"
id="roleName"

placeholder="名字">


<select
class="input"

id="gender">

<option>

男

</option>

<option>

女

</option>

<option>

其他

</option>

<option>

自定义

</option>

</select>



<textarea
class="input"

id="personality"

placeholder="性格">

</textarea>



<textarea
class="input"

id="style"

placeholder="说话风格">

</textarea>



<button
class="save"

onclick="saveRole()">

创建角色

</button>

</div>

</div>




<script>

let avatar=""


function openCreate(){

modal.style.display=
"flex"

}


function upload(
e
){

let f=

e.target.files[0]

if(!f)return


avatar=

URL.createObjectURL(
f
)

photo.src=

avatar

}


function saveRole(){

let data={

name:

document
.getElementById(
"roleName"
)
.value,

gender:

document
.getElementById(
"gender"
)
.value,

personality:

document
.getElementById(
"personality"
)
.value,

style:

document
.getElementById(
"style"
)
.value,

avatar

}


if(!data.name){

alert(
"请输入名字"
)

return

}


let roles=

JSON.parse(

localStorage.getItem(
"roles"
)

||

"[]"

)


roles.push(
data
)


localStorage.setItem(

"roles",

JSON.stringify(
roles
)

)


/* 清空 */

photo.src=""

avatar=""

document
.getElementById(
"roleName"
)
.value=""

gender.selectedIndex=0

personality.value=""

style.value=""

modal.style.display=
"none"


render()

}

function createStory(){

let title=

prompt(
"故事名字"
)

if(
!title
)return


let all=

JSON.parse(

localStorage.getItem(
"stories"
)

||

"[]"

)


all.unshift({

title

})


localStorage.setItem(

"stories",

JSON.stringify(
all
)

)


renderStory()

}



function renderStory(){

storyList.innerHTML=""


let all=

JSON.parse(

localStorage.getItem(
"stories"
)

||

"[]"

)


if(
!all.length
){

storyList.innerHTML=

`

<div class="empty">

还没有故事

</div>

`

return

}


all.forEach(

s=>{

storyList.innerHTML+=`

<div class="story">

<div class="story-name">

${s.title}

</div>

<div class="story-sub">

点击进入故事

</div>

</div>

`

}

)

}
  

function render(){

roles.innerHTML=

`

<div class="role">

<div>

我的设定

</div>

</div>

`


let all=

JSON.parse(

localStorage.getItem(
"roles"
)

||

"[]"

)


all.forEach(

(r,i)=>{

roles.innerHTML+=`

<div class="role">

<img
src="${r.avatar}">

<div
class="role-info">

<div
class="role-name">

${r.name}

</div>

<div
class="role-gender">

${r.gender}

</div>

</div>


<div
style="
margin-left:auto">

<button
onclick="editRole(${i})">

编辑

</button>

<button
onclick="deleteRole(${i})">

删除

</button>

</div>

</div>

`

}

)

}


function deleteRole(i){

let all=

JSON.parse(

localStorage.getItem(
"roles"
)

||

"[]"

)

all.splice(
i,
1
)

localStorage.setItem(

"roles",

JSON.stringify(
all
)

)

render()

}


function editRole(i){

alert(
"编辑功能下一版做🥹"
)

}
  

function tab(
id,
btn
){

document

.querySelectorAll(
".section"
)

.forEach(

v=>

v.classList.remove(
"show"
)

)

document

.getElementById(
id
)

.classList.add(
"show"
)


document

.querySelectorAll(
".item"
)

.forEach(

v=>

v.classList.remove(
"active"
)

)

btn.classList.add(
"active"
)

}


render()

renderStory()

</script>

</body>

</html>
