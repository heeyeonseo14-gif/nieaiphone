<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Your Life</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:

"Trebuchet MS",
sans-serif;

}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,

#F5EEFF,

#E6D8FA,

#D8C2F3

);

padding:

22px;

}

/* 标题 */

.header{

margin-top:24px;

}

.title{

font-size:34px;

font-weight:600;

color:

#53496A;

}

.sub{

margin-top:8px;

font-size:14px;

color:

#746A85;

}

/* 内容区 */

.content{

margin-top:26px;

height:

calc(
100vh - 250px
);

overflow:auto;

padding-bottom:120px;

}

/* 卡片 */

.card{

margin-bottom:14px;

padding:18px;

border-radius:28px;

background:

linear-gradient(

135deg,

rgba(
255,
255,
255,
.22
),

rgba(
255,
255,
255,
.08
)

);

backdrop-filter:

blur(30px);

}

.card-title{

font-size:18px;

color:

#544C64;

}

.card-sub{

margin-top:8px;

font-size:14px;

color:

#726B80;

}

/* TAB */

.tab{

position:fixed;

left:20px;

right:20px;

bottom:22px;

height:78px;

border-radius:32px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(40px);

display:flex;

justify-content:space-around;

align-items:center;

}

.tab-btn{

display:flex;

flex-direction:column;

align-items:center;

border:none;

background:none;

color:

#746A85;

font-size:13px;

}

.active{

color:

#52486A;

font-weight:600;

}

.icon{

font-size:22px;

margin-bottom:6px;

}

.hide{

display:none;

}

</style>

</head>

<body>


<div class="header">

<div class="title">

Your Life

</div>

<div class="sub">

继续你的故事

</div>

</div>



<div
class="content">


<!-- 当下 -->

<div id="now">

<div class="card">

<div class="card-title">

沈星河

</div>

<div class="card-sub">

刚刚更新剧情

</div>

</div>



<div class="card">

<div class="card-title">

林放

</div>

<div class="card-sub">

正在等待你的回复

</div>

</div>

</div>



<!-- 状态 -->

<div
id="status"

class="hide">

<div class="card">

<div class="card-title">

今天的动态

</div>

<div class="card-sub">

这里以后做朋友圈

</div>

</div>

</div>



<!-- 设置 -->

<div
id="setting"

class="hide">

<div class="card">

<div class="card-title">

我的设定

</div>

<div class="card-sub">

昵称｜关系｜偏好

</div>

</div>

</div>


</div>




<!-- 底部 -->

<div class="tab">

<button
class="tab-btn active"

onclick="switchTab('now',this)">

<div class="icon">

💬

</div>

当下

</button>



<button
class="tab-btn"

onclick="switchTab('status',this)">

<div class="icon">

🫧

</div>

状态

</button>



<button
class="tab-btn"

onclick="switchTab('setting',this)">

<div class="icon">

⚙️

</div>

设置

</button>

</div>




<script>

function switchTab(
id,
btn
){

document

.querySelectorAll(
".content > div"
)

.forEach(

v=>

v.classList.add(
"hide"
)

)

document

.getElementById(
id
)

.classList.remove(
"hide"
)


document

.querySelectorAll(
".tab-btn"
)

.forEach(

v=>

v.classList.remove(
"active"
)

)

btn.classList.add(
"active"
)

}

</script>


</body>

</html>
