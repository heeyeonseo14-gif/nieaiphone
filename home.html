<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>YaNie</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:

-apple-system,

sans-serif;

}

body{

height:100vh;

overflow:hidden;

background:

linear-gradient(
180deg,

#F4EEFF,

#E7D8FB,

#D8C2F3

);

padding:

18px;

}

/* 顶部 */

.status{

height:50px;

display:flex;

justify-content:space-between;

align-items:center;

color:white;

font-size:15px;

}

/* 资料卡 */

.profile{

height:220px;

margin-top:10px;

border-radius:36px;

background:

linear-gradient(

135deg,

rgba(
255,
255,
255,
.22
),

rgba(
255,
255,
255,
.08

)

);

backdrop-filter:

blur(40px);

border:

1px solid

rgba(
255,
255,
255,
.28
);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

box-shadow:

0 20px 50px

rgba(
150,
120,
200,
.1
);

}

.avatar{

width:88px;

height:88px;

border-radius:50%;

background:

rgba(
255,
255,
255,
.5
);

margin-bottom:16px;

}

.name{

font-size:26px;

color:white;

}

.desc{

margin-top:10px;

font-size:14px;

color:

rgba(
255,
255,
255,
.82
);

}

/* 图标 */

.apps{

margin-top:30px;

display:grid;

grid-template-columns:

1fr 1fr;

gap:20px;

}

.app{

height:110px;

border-radius:28px;

background:

rgba(
255,
255,
255,
.16
);

backdrop-filter:

blur(30px);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

color:white;

}

.icon{

font-size:30px;

margin-bottom:10px;

}

/* dock */

.dock{

position:fixed;

left:18px;

right:18px;

bottom:26px;

height:84px;

border-radius:32px;

background:

rgba(
255,
255,
255,
.2
);

backdrop-filter:

blur(40px);

display:flex;

justify-content:space-evenly;

align-items:center;

color:white;

}

</style>

</head>

<body>



<div class="status">

<div>
18:32
</div>

<div>

☁️

</div>

</div>



<div class="profile">

<div class="avatar">

</div>

<div class="name">

YaNie

</div>

<div class="desc">

今天也欢迎回来。

</div>

</div>



<div class="apps">

<div class="app">

<div class="icon">

💬

</div>

聊天

</div>



<div class="app">

<div class="icon">

📖

</div>

世界

</div>



<div class="app">

<div class="icon">

🎵

</div>

音乐

</div>



<div class="app">

<div class="icon">

⚙️

</div>

设置

</div>

</div>



<div class="dock">

🏠

⭐

👤

</div>



</body>

</html>
