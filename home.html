<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="./manifest.json">
  <title>NIEaiphone — 小家（可定制）</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#f0e6fb; --bg2:#e6d8f6; --card:rgba(255,255,255,0.36);
      --accent1:#9b86e6; --accent2:#7a64d0; --text:#2f2540;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:"Quicksand","Nunito","Segoe UI",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      display:flex;align-items:center;justify-content:center;color:var(--text);
      padding:20px;
    }

    /* 手机框架 */
    .frame{
      width:92%;max-width:420px;height:84vh;border-radius:34px;background:var(--card);
      backdrop-filter:blur(14px);box-shadow:0 18px 50px rgba(40,24,60,0.12);padding:18px;display:flex;flex-direction:column;position:relative;
    }

    .top{display:flex;align-items:center;gap:12px;padding:8px 6px}
    .logoBox{
      width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#fff,#fff8);box-shadow:0 8px 22px rgba(124,93,232,0.12);overflow:hidden;
      flex-shrink:0;
    }
    .logoBox img{width:100%;height:100%;object-fit:cover;display:block}
    .titleWrap{flex:1}
    .title{font-size:20px;font-weight:700;margin:0}
    .subtitle{font-size:12px;color:rgba(47,37,64,0.7);margin-top:4px}

    .controlsRow{display:flex;gap:8px;align-items:center;margin-left:8px}
    .editBtn{background:transparent;border:1px solid rgba(47,37,64,0.06);padding:8px 10px;border-radius:10px;font-size:13px;cursor:pointer}

    /* 图标网格：正方形图标，仅显示图片 */
    .screen{flex:1;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:8px 6px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}
    .icon{
      display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;user-select:none;
      transition:transform .14s ease, box-shadow .14s ease; padding:6px; border-radius:14px; text-align:center;
    }
    .icon:hover{transform:translateY(-6px)}
    .iconImg{
      width:72px;height:72px;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;
      box-shadow: 0 8px 22px rgba(47,35,70,0.06); background:transparent;
    }
    .iconImg img{width:100%;height:100%;object-fit:cover;display:block}
    .iconLabel{font-size:13px;font-weight:600;color:#3b2f4b}

    /* footer */
    .footer{font-size:12px;color:rgba(47,37,64,0.6);text-align:center;padding:8px;margin-top:8px}

    /* ========== MODAL 样式（已修复响应式/键盘遮挡问题） ========== */

    /* modalWrap 居中显示，但允许内容内部滚动 */
    .modalWrap{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(8,6,12,0.45);
      z-index:1000;
      padding:16px;
    }

    /* modal 容器：宽度自适应、限制最大高度并可滚动（关键） */
    .modal{
      width:100%;
      max-width:640px;
      max-height:84vh;              /* 关键：限制高度，避免被虚拟键盘覆盖 */
      overflow:auto;                /* 关键：当内容过多时可滚动 */
      background:white;
      border-radius:14px;
      padding:16px 16px 88px 16px;  /* 底部留足空间给 sticky actions */
      box-shadow:0 30px 80px rgba(12,10,25,0.5);
      position:relative;
      -webkit-overflow-scrolling: touch; /* 平滑滚动，移动端更友好 */
    }

    /* 内容区样式 */
    .modal h3{margin:0 0 12px;font-size:18px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;margin-bottom:6px;color:#3b2f4b}
    .field input[type="text"], .field input[type="url"], .field textarea{width:100%;padding:8px;border-radius:8px;border:1px solid rgba(15,12,20,0.06)}
    .rowInputs{display:flex;gap:8px}
    .small{font-size:12px;color:#6b5f7a;margin-top:6px}

    /* 操作区：sticky 固定在 modal 底部，避免被键盘遮挡（关键） */
    .modalActions{
      position:sticky;
      bottom:0;
      left:0;
      display:flex;
      gap:8px;
      justify-content:flex-end;
      padding:12px;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.98));
      border-top: 1px solid rgba(15,12,20,0.03);
      backdrop-filter: blur(2px);
    }

    .btnPrimary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:white;padding:10px 14px;border-radius:10px;border:none;cursor:pointer}
    .btnGhost{background:transparent;border:1px solid rgba(47,37,64,0.06);padding:10px 12px;border-radius:10px;cursor:pointer}

    /* small screen adjustment: modal full width with padding */
    @media (max-width:420px){
      .modal{max-width:100%; padding:14px 12px 90px 12px}
      .modalActions{padding:10px; gap:6px}
      .iconImg{width:64px;height:64px}
    }
  </style>
</head>
<body>
  <div class="frame" role="application" aria-label="NIEaiphone 小家（可定制）">
    <div class="top">
      <div class="logoBox" id="logoBox" title="点击更换logo">
        <img id="logoImg" alt="logo" src="">
      </div>

      <div class="titleWrap">
        <div class="title" id="pageTitle">NIEaiphone</div>
        <div class="subtitle" id="pageSubtitle">欢迎回家 · 点击图标打开应用</div>
      </div>

      <div class="controlsRow">
        <button class="editBtn" id="openCustomize">自定义</button>
      </div>
    </div>

    <div class="screen">
      <div class="grid" role="grid" id="iconGrid">
        <div class="icon" data-key="chat" tabindex="0" role="button" aria-label="聊天">
          <div class="iconImg"><img id="icon-chat" src="" alt="聊天"></div>
          <div class="iconLabel">聊天</div>
        </div>

        <div class="icon" data-key="diary" tabindex="0" role="button" aria-label="日记">
          <div class="iconImg"><img id="icon-diary" src="" alt="日记"></div>
          <div class="iconLabel">日记</div>
        </div>

        <div class="icon" data-key="forum" tabindex="0" role="button" aria-label="论坛">
          <div class="iconImg"><img id="icon-forum" src="" alt="论坛"></div>
          <div class="iconLabel">论坛</div>
        </div>

        <div class="icon" data-key="api" tabindex="0" role="button" aria-label="API 设置">
          <div class="iconImg"><img id="icon-api" src="" alt="API"></div>
          <div class="iconLabel">API 设置</div>
        </div>

        <div class="icon" data-key="theme" tabindex="0" role="button" aria-label="美化">
          <div class="iconImg"><img id="icon-theme" src="" alt="美化"></div>
          <div class="iconLabel">美化</div>
        </div>

        <div class="icon" data-key="more" tabindex="0" role="button" aria-label="记忆">
          <div class="iconImg"><img id="icon-more" src="" alt="记忆"></div>
          <div class="iconLabel">记忆</div>
        </div>
      </div>

      <!-- ===== 新增 START：桌面图标 ===== -->

<div class="icon" data-key="instagram" tabindex="0" role="button" aria-label="Instagram">
  <div class="iconImg"><img id="icon-instagram" src="" alt="Instagram"></div>
  <div class="iconLabel">Instagram</div>
</div>

<div class="icon" data-key="worldbook" tabindex="0" role="button" aria-label="世界书">
  <div class="iconImg"><img id="icon-worldbook" src="" alt="世界书"></div>
  <div class="iconLabel">世界书</div>
</div>

<div class="icon" data-key="music" tabindex="0" role="button" aria-label="音乐">
  <div class="iconImg"><img id="icon-music" src="" alt="音乐"></div>
  <div class="iconLabel">音乐</div>
</div>

<!-- ===== 新增 END ===== -->
      
      <div style="flex:1"></div>
    </div>

    <div class="footer">* 提示：点击“自定义”可以更换标题 / 副标题 / logo / 每个图标的图片（支持上传或填 URL）。</div>
  </div>

  <!-- 自定义模态（已改为响应式 + 可滚动 + sticky actions） -->
  <div class="modalWrap" id="modalWrap" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="customTitle">
      <h3 id="customTitle">自定义主页</h3>

      <div class="field">
        <label>主页标题（示例：NIEaiphone）</label>
        <input type="text" id="inputTitle" placeholder="输入主页标题">
      </div>

      <div class="field">
        <label>副标题（示例：欢迎回家 · 点击图标打开应用）</label>
        <input type="text" id="inputSubtitle" placeholder="输入副标题">
      </div>

      <div class="field">
        <label>Logo（心形）— 可上传本地图片 或 粘贴图片 URL</label>
        <div class="rowInputs">
          <input type="file" id="logoFile" accept="image/*">
          <input type="url" id="logoUrl" placeholder="或粘贴图片 URL">
        </div>
        <div class="small">上传图片会被转换为 data URL 并保存在本地浏览器，适合快速部署 demo；长期建议填入外链 URL（自行托管）。</div>
      </div>

      <hr style="margin:12px 0;border:none;border-top:1px solid rgba(15,12,20,0.04)">

      <div class="field">
        <label>图标图片替换（每个图标分别上传或填 URL）</label>

        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
          <div>
            <div style="font-weight:600;margin-bottom:6px">聊天 (chat)</div>
            <input type="file" data-key="chat" class="iconFile" accept="image/*">
            <input type="url" data-key="chat" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>

          <div>
            <div style="font-weight:600;margin-bottom:6px">日记 (diary)</div>
            <input type="file" data-key="diary" class="iconFile" accept="image/*">
            <input type="url" data-key="diary" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>

          <div>
            <div style="font-weight:600;margin-bottom:6px">论坛 (forum)</div>
            <input type="file" data-key="forum" class="iconFile" accept="image/*">
            <input type="url" data-key="forum" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>

          <div>
            <div style="font-weight:600;margin-bottom:6px">API 设置 (api)</div>
            <input type="file" data-key="api" class="iconFile" accept="image/*">
            <input type="url" data-key="api" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>

          <div>
            <div style="font-weight:600;margin-bottom:6px">美化 (theme)</div>
            <input type="file" data-key="theme" class="iconFile" accept="image/*">
            <input type="url" data-key="theme" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>

          <div>
            <div style="font-weight:600;margin-bottom:6px">记忆 (more)</div>
            <input type="file" data-key="more" class="iconFile" accept="image/*">
            <input type="url" data-key="more" class="iconUrl" placeholder="或图片 URL" style="margin-top:6px">
          </div>
        </div>
      </div>

      <!-- sticky 操作栏：始终可见（避免被键盘挡住） -->
      <div class="modalActions">
        <button class="btnGhost" id="resetBtn">重置为默认</button>
        <button class="btnGhost" id="cancelBtn">取消</button>
        <button class="btnPrimary" id="saveBtn">保存并应用</button>
      </div>
    </div>
  </div>

  <script>
    // 与之前逻辑一致（保存/读取 localStorage），没有改变 API
    const STORAGE_KEY = 'nie_home_settings_v1';
    const defaultState = {
      title: 'NIEaiphone',
      subtitle: '欢迎回家 · 点击图标打开应用',
      logo: '',
      icons: { 
  chat:'', diary:'', forum:'', api:'', theme:'', more:'',
  instagram:'', worldbook:'', music:''
      }
    };

    const builtin = {
      logo: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='32' width='100%' height='100%' fill='white'/><text x='50%' y='50%' font-size='120' text-anchor='middle' dominant-baseline='central'>💜</text></svg>`),
      chat: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='110' text-anchor='middle' dominant-baseline='central'>💬</text></svg>`),
      diary: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='100' text-anchor='middle' dominant-baseline='central'>📓</text></svg>`),
      forum: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='100' text-anchor='middle' dominant-baseline='central'>🧭</text></svg>`),
      api: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='96' text-anchor='middle' dominant-baseline='central'>🛠️</text></svg>`),
      theme: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='96' text-anchor='middle' dominant-baseline='central'>🎨</text></svg>`),
      more: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><rect rx='24' width='100%' height='100%' fill='transparent'/><text x='50%' y='52%' font-size='110' text-anchor='middle' dominant-baseline='central'>✨</text></svg>`)
      instagram: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><text x='50%' y='52%' font-size='110' text-anchor='middle'>📷</text></svg>`),
      worldbook: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><text x='50%' y='52%' font-size='110' text-anchor='middle'>🌍</text></svg>`),
      music: 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><text x='50%' y='52%' font-size='110' text-anchor='middle'>🎵</text></svg>`),
    };

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        const state = structuredClone(defaultState);
        if(parsed.title) state.title = parsed.title;
        if(parsed.subtitle) state.subtitle = parsed.subtitle;
        if(parsed.logo) state.logo = parsed.logo;
        if(parsed.icons) state.icons = {...state.icons, ...parsed.icons};
        return state;
      }catch(e){
        console.error('loadState error', e);
        return structuredClone(defaultState);
      }
    }
    function saveState(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function applyState(state){
      document.getElementById('pageTitle').textContent = state.title || defaultState.title;
      document.getElementById('pageSubtitle').textContent = state.subtitle || defaultState.subtitle;
      const logoImg = document.getElementById('logoImg');
      if(state.logo) logoImg.src = state.logo; else logoImg.src = builtin.logo;
      const keys = Object.keys(defaultState.icons);
      keys.forEach(k=>{
        const el = document.getElementById('icon-' + k);
        if(state.icons && state.icons[k]) el.src = state.icons[k]; else el.src = builtin[k];
      });
    }

    // init
    let state = loadState();
    if(!state.logo) state.logo = builtin.logo;
    Object.keys(defaultState.icons).forEach(k=>{ if(!state.icons[k]) state.icons[k] = builtin[k]; });
    applyState(state);

    // modal controls + inputs
    const modalWrap = document.getElementById('modalWrap');
    const openCustomize = document.getElementById('openCustomize');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');

    const inputTitle = document.getElementById('inputTitle');
    const inputSubtitle = document.getElementById('inputSubtitle');
    const logoFile = document.getElementById('logoFile');
    const logoUrl = document.getElementById('logoUrl');
    const iconFiles = document.querySelectorAll('.iconFile');
    const iconUrls = document.querySelectorAll('.iconUrl');

    function openModal(){
      inputTitle.value = state.title || '';
      inputSubtitle.value = state.subtitle || '';
      logoUrl.value = ''; logoFile.value = '';
      iconFiles.forEach(f=>f.value='');
      iconUrls.forEach(i=>i.value='');
      modalWrap.style.display = 'flex';
      modalWrap.setAttribute('aria-hidden','false');
      // small timeout to ensure mobile scroll into view
      setTimeout(()=>{ document.querySelector('.modal').scrollTop = 0; }, 60);
    }
    function closeModal(){ modalWrap.style.display = 'none'; modalWrap.setAttribute('aria-hidden','true'); }

    openCustomize.addEventListener('click', openModal);
    cancelBtn.addEventListener('click', (e)=>{ e.preventDefault(); closeModal(); });
    modalWrap.addEventListener('click', (e)=>{ if(e.target === modalWrap) closeModal(); });

    function fileToDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = ()=> resolve(reader.result);
        reader.onerror = err => reject(err);
        reader.readAsDataURL(file);
      });
    }

    async function gatherAndSave(){
      // disable save button briefly to avoid double click
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      state.title = inputTitle.value || defaultState.title;
      state.subtitle = inputSubtitle.value || defaultState.subtitle;

      if(logoFile.files && logoFile.files[0]){
        try{ state.logo = await fileToDataUrl(logoFile.files[0]); }catch(e){ console.warn('logo read err', e); }
      } else if(logoUrl.value && logoUrl.value.trim()){
        state.logo = logoUrl.value.trim();
      }

      const keys = Object.keys(defaultState.icons);
      for(const k of keys){
        const fileInput = document.querySelector('.iconFile[data-key="'+k+'"]');
        const urlInput = document.querySelector('.iconUrl[data-key="'+k+'"]');
        if(fileInput && fileInput.files && fileInput.files[0]){
          try{ state.icons[k] = await fileToDataUrl(fileInput.files[0]); }catch(e){ console.warn('icon file err', e); }
        } else if(urlInput && urlInput.value && urlInput.value.trim()){
          state.icons[k] = urlInput.value.trim();
        }
      }

      saveState(state);
      applyState(state);

      // restore save button
      saveBtn.disabled = false;
      saveBtn.textContent = '保存并应用';
      closeModal();
    }

    saveBtn.addEventListener('click', (e)=>{ e.preventDefault(); gatherAndSave(); });

    resetBtn.addEventListener('click', (e)=>{ e.preventDefault();
      if(confirm('确认要恢复为默认设置？这会清除已保存的自定义图片与文字。')){
        state = structuredClone(defaultState);
        localStorage.removeItem(STORAGE_KEY);
        state.logo = builtin.logo;
        Object.keys(defaultState.icons).forEach(k=>state.icons[k]=builtin[k]);
        applyState(state);
        closeModal();
      }
    });

    // icon click: try navigate to page if exists
    document.querySelectorAll('.icon').forEach(el=>{
      el.addEventListener('click', ()=>{
        const key = el.getAttribute('data-key');
        const mapping = {
chat: 'chat.html',
diary: 'diary.html',
forum: 'forum.html',
api: 'api.html',
theme: 'theme.html',
more: 'ai_memory_v2.html',

instagram: 'instagram.html',
worldbook: 'worldbook.html',
music: 'music.html'
};
        const href = mapping[key] || '#';
        if(href === '#') { alert('该功能将来会开放（更多功能占位）。'); }
        else { location.href = href; }
      });
      el.addEventListener('keydown', e=>{ if(e.key === 'Enter') el.click(); });
    });

    // Ensure modal is scrollable when keyboard appears on mobile:
    // Some mobile browsers shrink viewport; we add a small listener to scroll modal into view.
    window.addEventListener('resize', ()=> {
      const modal = document.querySelector('.modal');
      if(modal && modalWrap.style.display === 'flex'){
        // scroll modal content to active element
        const active = document.activeElement;
        if(active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')){
          // scroll the modal so the active element is visible
          setTimeout(()=> {
            active.scrollIntoView({behavior:'smooth', block:'center'});
          }, 200);
        }
      }
    });
  </script>
  
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');
}
</script>
  
</body>
</html>
