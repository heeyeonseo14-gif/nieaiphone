<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>YaNie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:

"Trebuchet MS",
sans-serif;

}

body{

height:100vh;

overflow:hidden;

padding:18px;

background:

linear-gradient(
180deg,

#F5EEFF,

#E5D6FA,

#D7C0F2

);

}

/* 顶部 */

.status{

height:42px;

display:flex;

justify-content:space-between;

align-items:center;

color:

rgba(
255,
255,
255,
.85
);

}

/* 卡片 */

.profile{

height:200px;

margin-top:12px;

border-radius:36px;

background:

linear-gradient(

135deg,

rgba(
255,
255,
255,
.22
),

rgba(
255,
255,
255,
.08
)

);

backdrop-filter:

blur(40px);

border:

1px solid

rgba(
255,
255,
255,
.25
);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.avatar{

width:82px;

height:82px;

border-radius:50%;

background:

rgba(
255,
255,
255,
.45
);

margin-bottom:14px;

}

.name{

font-size:32px;

font-weight:600;

color:

#4A4257;

}


.desc{

margin-top:10px;

color:

#6D657B;

font-size:15px;

}

/* APP */

.apps{

margin-top:24px;

color:

#544C64;

display:grid;

grid-template-columns:

1fr 1fr;

gap:14px;

}

.app{

height:95px;

border-radius:28px;

color:

#544C64;
  
background:

rgba(
255,
255,
255,
.16
);

backdrop-filter:

blur(32px);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-decoration:none;

color:white;

}

.icon{

width:30px;

height:30px;

margin-bottom:10px;

}

/* Dock */

.dock{

position:fixed;

left:18px;

right:18px;

bottom:26px;

height:78px;

border-radius:30px;

color:

#4A4257;

background:

rgba(
255,
255,
255,
.2
);

backdrop-filter:

blur(40px);

display:flex;

justify-content:space-evenly;

align-items:center;

}

.dock a{

display:flex;

justify-content:center;

align-items:center;

}

.dock img{

width:28px;

height:28px;

}

</style>

</head>

<body>


<div class="status">

<div></div>

<div></div>

</div>



<div class="profile">

<div class="avatar">

</div>

<div class="name">

YaNie

</div>

<div class="desc">

今天也欢迎回来。

</div>

</div>



<div class="apps">


<a
class="app"
href="weibo.html">

<img
class="icon"

src=

"https://api.iconify.design/lucide/newspaper.svg">

微博

</a>



<a
class="app"
href="life.html">

<img
class="icon"

src=

"https://api.iconify.design/lucide/heart.svg">

Your Life

</a>



<a
class="app"
href="music.html">

<img
class="icon"

src=

"https://api.iconify.design/lucide/headphones.svg">

Music

</a>



<a
class="app"
href="worldbook.html">

<img
class="icon"

src=

"https://api.iconify.design/lucide/book-heart.svg">

世界书

</a>


</div>



<div class="dock">


<a
href="api.html">

<img

src=

"https://api.iconify.design/lucide/cpu.svg">

</a>



<a
href="appearance.html">

<img

src=

"https://api.iconify.design/lucide/palette.svg">

</a>



<a
href="memory.html">

<img

src=

"https://api.iconify.design/lucide/brain.svg">

</a>


</div>



</body>

</html>
