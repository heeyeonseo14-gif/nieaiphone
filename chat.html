<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="./manifest.json">

<title>NIEaiphone · 聊天</title>

<style>

:root{
  --accent:#8e7ae6;
  --text:#2f2436;
  --muted:#8a7f99;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;

  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#f5edff,#efe7fb);
  color:var(--text);
}

/* APP */

.app{
  max-width:430px;
  margin:0 auto;

  height:100dvh;

  display:flex;
  flex-direction:column;

  backdrop-filter:blur(12px);

  padding-bottom:env(safe-area-inset-bottom);
}

/* HEADER */

.header{
  padding:14px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header h1{
  margin:0;
  font-size:18px;
}

.iconBtn{
  min-width:36px;
  height:36px;

  border:none;
  border-radius:12px;

  background:white;
  font-size:16px;
}

/* 聊天列表 */

.chatList{
  flex:1;
  min-height:0;

  padding:12px;

  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* 单个聊天 */

.chatItem{

  display:flex;
  gap:12px;

  padding:12px;

  background:rgba(255,255,255,.75);
  backdrop-filter:blur(10px);

  border-radius:16px;

  margin-bottom:10px;

  cursor:pointer;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:14px;
  object-fit:cover;
}

.info{
  flex:1;
}

.nameRow{
  display:flex;
  justify-content:space-between;

  font-weight:600;
}

.lastMsg{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.time{
  font-size:12px;
  color:#999;
}

/* 未读 */

.unread{
  background:#ff4d4f;
  color:white;

  font-size:11px;

  padding:2px 6px;

  border-radius:999px;

  margin-left:6px;
}

/* 底部导航 */

.nav{

  display:flex;

  border-top:1px solid rgba(0,0,0,.05);

  background:rgba(255,255,255,.8);
  backdrop-filter:blur(10px);
}

.nav button{

  flex:1;

  border:none;
  background:none;

  padding:12px 0;

  font-size:14px;
  font-weight:600;

  color:#777;
}

.nav button.active{
  color:var(--accent);
}

/* 【新增】添加聊天弹窗样式 */

.modalMask{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:99;
}

.modal{
background:white;
width:92%;
max-width:360px;
border-radius:20px;
padding:18px;
}

.modal input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #e3dcf3;
}

.pickBtn{
width:100%;
padding:12px;
border-radius:14px;
border:1px dashed #d8d0f0;
background:#faf8ff;
font-weight:600;
margin-bottom:12px;
}

.avatarPreview{
width:72px;
height:72px;
border-radius:18px;
display:none;
margin:6px auto 12px;
object-fit:cover;
}

.modalActions{
display:flex;
gap:10px;
}

.modalActions button{
flex:1;
padding:12px;
border-radius:999px;
border:none;
font-weight:700;
}

.modalActions button:first-child{
background:#f2eefc;
}

.modalActions button:last-child{
background:linear-gradient(135deg,#9b8cff,#7c68e6);
color:white;
}

</style>
</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<button class="iconBtn" onclick="location.href='home.html'">←</button>

<h1>聊天</h1>

<button class="iconBtn" onclick="openAdd()">＋</button>

</div>

<!-- 聊天列表 -->

<div class="chatList" id="chatList"></div>

<!-- 底部导航 -->

<div class="nav">

<button class="active" onclick="goChat()">
聊天
</button>

<button onclick="goFeed()">
朋友圈
</button>

<!-- 【修改】钱包 → 设置 -->

<button onclick="goSetting()">
设置
</button>

</div>

</div>

<!-- 【新增】添加聊天弹窗 -->

<div class="modalMask" id="addModal">

<div class="modal">

<h3>添加聊天</h3>

<input id="contactName" placeholder="联系人名称">

<img id="avatarPreview" class="avatarPreview">

<button class="pickBtn" onclick="pickAvatar()">选择头像</button>
<input type="file" id="avatarInput" accept="image/*" hidden>

<div class="modalActions">

<button onclick="closeAdd()">取消</button>
<button onclick="saveContact()">创建</button>

</div>

</div>

</div>

<script>

const KEY="nie_contacts_v1"

function load(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function save(v){
localStorage.setItem(KEY,JSON.stringify(v))
}

function formatTime(t){

if(!t) return ""

const d=new Date(t)

return d.getHours().toString().padStart(2,"0")
+":"+d.getMinutes().toString().padStart(2,"0")

}

/* 渲染聊天列表 */

function render(){

const list=load()

const chatList=document.getElementById("chatList")

chatList.innerHTML=""

list
.sort((a,b)=>b.lastTime-a.lastTime)
.forEach(c=>{

const div=document.createElement("div")

div.className="chatItem"

div.innerHTML=`

<img class="avatar"
src="${c.avatar||'https://emoji.slack-edge.com/T024FPYBQ/pleading/8d1b9c.png'}">

<div class="info">

<div class="nameRow">

<span>${c.name}</span>

<span class="time">
${formatTime(c.lastTime)}
</span>

</div>

<div class="lastMsg">

${c.lastMsg||""}

${c.unread?`<span class="unread">${c.unread}</span>`:""}

</div>

</div>

`

div.onclick=()=>{
location.href="chat_ui.html?cid="+c.id
}

chatList.appendChild(div)

})

}

render()

/* 底部导航 */

function goChat(){}

function goFeed(){
location.href="feed.html"
}

/* 【修改】钱包 → 设置 */

function goSetting(){
location.href="my_setting.html"
}

/* 【新增】添加聊天功能 */

let avatarData=""

function openAdd(){
document.getElementById("addModal").style.display="flex"
}

function closeAdd(){
document.getElementById("addModal").style.display="none"
}

/* 选择头像 */

function pickAvatar(){
document.getElementById("avatarInput").click()
}

document.getElementById("avatarInput").addEventListener("change",e=>{

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

avatarData=ev.target.result

const img=document.getElementById("avatarPreview")

img.src=avatarData
img.style.display="block"

}

reader.readAsDataURL(file)

})

/* 保存联系人 */

function saveContact(){

const name=document.getElementById("contactName").value.trim()

if(!name) return

const list=load()

list.push({

id:"c"+Date.now(),

name:name,

avatar:avatarData,

type:"single",

lastMsg:"",

lastTime:Date.now()

})

save(list)

closeAdd()

render()

}

</script>

</body>
</html>
