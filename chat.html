<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="./manifest.json">

<title>NIEaiphone · 聊天</title>

<style>

:root{
  --accent:#8e7ae6;
  --text:#2f2436;
  --muted:#8a7f99;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#f5edff,#efe7fb);
  color:var(--text);
}

/* APP */

.app{
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  flex-direction:column;
  backdrop-filter:blur(12px);
  padding-bottom:env(safe-area-inset-bottom);
}

/* HEADER */

.header{
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header h1{
  margin:0;
  font-size:18px;
}

.iconBtn{
  min-width:36px;
  height:36px;
  border:none;
  border-radius:12px;
  background:white;
  font-size:16px;
}

/* 聊天列表 */

.chatList{
  flex:1;
  min-height:0;
  padding:12px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* 单个聊天 */

.chatItem{
  position:relative;
  display:flex;
  gap:12px;
  padding:12px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(10px);
  border-radius:16px;
  margin-bottom:10px;
  cursor:pointer;
}

.avatar{
  width:52px;
  height:52px;
  border-radius:14px;
  object-fit:cover;
}

.info{
  flex:1;
}

.nameRow{
  display:flex;
  justify-content:space-between;
  font-weight:600;
}

.lastMsg{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.time{
  font-size:12px;
  color:#999;
}

.delBtn{
  position:absolute;
  top:8px;
  right:8px;
  border:none;
  background:none;
  color:#c66;
  font-size:14px;
}

/* 未读 */

.unread{
  background:#ff4d4f;
  color:white;
  font-size:11px;
  padding:2px 6px;
  border-radius:999px;
  margin-left:6px;
}

/* 底部导航 */

.nav{
  display:flex;
  border-top:1px solid rgba(0,0,0,.05);
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(10px);
}

.nav button{
  flex:1;
  border:none;
  background:none;
  padding:12px 0;
  font-size:14px;
  font-weight:600;
  color:#777;
}

.nav button.active{
  color:var(--accent);
}

/* 弹窗 */

.modalMask{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:99;
}

.modal{
background:white;
width:92%;
max-width:360px;
border-radius:20px;
padding:18px;
}

.modal input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #e3dcf3;
}

.pickBtn{
width:100%;
padding:12px;
border-radius:14px;
border:1px dashed #d8d0f0;
background:#faf8ff;
font-weight:600;
margin-bottom:12px;
}

.avatarPreview{
width:72px;
height:72px;
border-radius:18px;
display:none;
margin:6px auto 12px;
object-fit:cover;
}

.modalActions{
display:flex;
gap:10px;
}

.modalActions button{
flex:1;
padding:12px;
border-radius:999px;
border:none;
font-weight:700;
}

.modalActions button:first-child{
background:#f2eefc;
}

.modalActions button:last-child{
background:linear-gradient(135deg,#9b8cff,#7c68e6);
color:white;
}

.groupBtn{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid #ddd;
background:#faf8ff;
font-weight:600;
margin-bottom:12px;
cursor:pointer;
}

.memberList{
max-height:120px;
overflow:auto;
margin-bottom:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<button class="iconBtn" onclick="location.href='home.html'">←</button>

<h1>聊天</h1>

<button class="iconBtn" onclick="openAdd()">＋</button>

</div>

<div class="chatList" id="chatList"></div>

<div class="nav">

<button class="active">聊天</button>

<button onclick="goFeed()">朋友圈</button>

<button onclick="goSetting()">设置</button>

</div>

</div>

<!-- 添加聊天 -->

<div class="modalMask" id="addModal">

<div class="modal">

<h3>添加聊天</h3>

<input id="contactName" placeholder="联系人名称">

<img id="avatarPreview" class="avatarPreview">

<button class="pickBtn" onclick="pickAvatar()">选择头像</button>
<input type="file" id="avatarInput" accept="image/*" hidden>

<button class="groupBtn" onclick="toggleGroup()">创建群聊</button>

<div id="groupPanel" style="display:none">

<input id="groupName" placeholder="群聊名称">

<img id="groupAvatarPreview" class="avatarPreview">

<button class="pickBtn" onclick="pickGroupAvatar()">选择群头像</button>
<input type="file" id="groupAvatarInput" accept="image/*" hidden>

<div id="memberList" class="memberList"></div>

</div>

<div class="modalActions">

<button onclick="closeAdd()">取消</button>
<button onclick="saveContact()">创建</button>

</div>

</div>

</div>

<script>

const KEY="nie_contacts_v1"
const MSG_KEY="nie_msgs_v1"

function load(){
return JSON.parse(localStorage.getItem(KEY)||"[]")
}

function save(v){
localStorage.setItem(KEY,JSON.stringify(v))
}

function loadMsgs(){
return JSON.parse(localStorage.getItem(MSG_KEY)||"{}")
}

function saveMsgs(v){
localStorage.setItem(MSG_KEY,JSON.stringify(v))
}

function formatTime(t){
if(!t) return ""
const d=new Date(t)
return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")
}

/* 渲染聊天列表 */

function render(){

const list=load()
const msgs=loadMsgs()

const chatList=document.getElementById("chatList")
chatList.innerHTML=""

list.sort((a,b)=>getLastTime(b,msgs)-getLastTime(a,msgs))

.forEach(c=>{

const div=document.createElement("div")
div.className="chatItem"

div.innerHTML=`

<button class="delBtn" onclick="delChat('${c.id}',event)">✕</button>

<img class="avatar"
src="${c.avatar||'https://emoji.slack-edge.com/T024FPYBQ/pleading/8d1b9c.png'}">

<div class="info">

<div class="nameRow">

<span>${c.name}</span>

<span class="time">
${formatTime(getLastTime(c,msgs))}
</span>

</div>

<div class="lastMsg">

${getLastMsg(c,msgs)}

${getUnread(c,msgs)}

</div>

</div>
`

div.onclick=()=>{
markRead(c.id)
location.href="chat_ui.html?cid="+c.id
}

chatList.appendChild(div)

})

}

function getLastMsg(chat,msgs){

const arr=msgs[chat.id]
if(!arr||arr.length===0) return ""

const last=arr[arr.length-1]

if(chat.type==="group"){
return last.sender+"："+last.text
}

return last.text
}

function getLastTime(chat,msgs){

const arr=msgs[chat.id]
if(!arr||arr.length===0) return chat.lastTime

return arr[arr.length-1].time
}

function getUnread(chat,msgs){

const arr=msgs[chat.id]
if(!arr) return ""

let count=0
arr.forEach(m=>{
if(!m.read) count++
})

if(count===0) return ""

return `<span class="unread">${count}</span>`
}

function markRead(cid){

const msgs=loadMsgs()

if(!msgs[cid]) return

msgs[cid].forEach(m=>m.read=true)

saveMsgs(msgs)

}

/* 删除 */

function delChat(id,e){

e.stopPropagation()

if(!confirm("删除这个聊天？")) return

const list=load().filter(c=>c.id!==id)

save(list)

render()

}

render()

function goFeed(){
location.href="feed.html"
}

function goSetting(){
location.href="my_setting.html"
}

/* 添加聊天 */

let avatarData=""
let groupMode=false
let groupAvatarData=""

function openAdd(){

document.getElementById("addModal").style.display="flex"

/* 重置 */

document.getElementById("contactName").value=""
document.getElementById("groupName").value=""

avatarData=""
groupAvatarData=""

document.getElementById("avatarPreview").style.display="none"
document.getElementById("groupAvatarPreview").style.display="none"

groupMode=false
document.getElementById("groupPanel").style.display="none"

renderMembers()

}

function closeAdd(){
document.getElementById("addModal").style.display="none"
}

function pickAvatar(){
document.getElementById("avatarInput").click()
}

document.getElementById("avatarInput").addEventListener("change",e=>{

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

avatarData=ev.target.result

const img=document.getElementById("avatarPreview")
img.src=avatarData
img.style.display="block"

}

reader.readAsDataURL(file)

})

function toggleGroup(){

groupMode=!groupMode

document.getElementById("groupPanel").style.display=
groupMode?"block":"none"

}

function pickGroupAvatar(){
document.getElementById("groupAvatarInput").click()
}

document.getElementById("groupAvatarInput").addEventListener("change",e=>{

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

groupAvatarData=ev.target.result

const img=document.getElementById("groupAvatarPreview")
img.src=groupAvatarData
img.style.display="block"

}

reader.readAsDataURL(file)

})

function renderMembers(){

const list=load()
const box=document.getElementById("memberList")

box.innerHTML=""

list.forEach(c=>{

const div=document.createElement("div")

div.innerHTML=`
<label>
<input type="checkbox" value="${c.id}">
${c.name}
</label>
`

box.appendChild(div)

})

}

/* 保存 */

function saveContact(){

const list=load()

if(groupMode){

let name=document.getElementById("groupName").value.trim()

if(!name){
name="群聊"
}

const members=[...document.querySelectorAll("#memberList input:checked")]
.map(i=>i.value)

list.push({

id:"g"+Date.now(),
name:name,
avatar:groupAvatarData,
type:"group",
members:members,
lastMsg:"",
lastTime:Date.now()

})

}else{

const name=document.getElementById("contactName").value.trim()

if(!name) return

list.push({

id:"c"+Date.now(),
name:name,
avatar:avatarData,
type:"single",
lastMsg:"",
lastTime:Date.now()

})

}

save(list)

closeAdd()

render()

}

</script>

</body>
</html>
