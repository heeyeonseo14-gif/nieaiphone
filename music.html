<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Music</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Trebuchet MS";
}

body{

height:100vh;

padding:22px;

background:

linear-gradient(
180deg,
#F5EEFF,
#E6D8FA,
#D8C2F3
);

}

.title{

font-size:34px;

color:#4D4460;

margin-bottom:24px;

}

.card{

padding:22px;

margin-bottom:18px;

border-radius:32px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(40px);

}

.row{

display:flex;

justify-content:
space-between;

align-items:center;

}

.btn{

border:none;

padding:10px 18px;

border-radius:18px;

background:

#4A4257;

color:white;

}

.player{

margin-top:18px;

display:none;

}

audio{

width:100%;

}

.name{

margin-bottom:12px;

color:#4D4460;

}

</style>

</head>

<body>



<div class="title">

Music

</div>



<div class="card">

<div class="row">

<div>

Spotify

</div>

<button
class="btn"

onclick="openSpotify()">

连接

</button>

</div>

</div>



<div class="card">

<div class="row">

<div>

网易云

</div>

<button
class="btn"

onclick="openCloud()">

连接

</button>

</div>

</div>



<div class="card">

<div>

我的音乐

</div>


<input

type="file"

accept=".mp3,audio/*"

onchange="uploadMusic(event)">



<div
class="player"

id="player">

<div
class="name"

id="musicName">

</div>

<audio
controls

id="audio">

</audio>

</div>


</div>



<script>

function openSpotify(){

window.open(

"https://open.spotify.com",

"_blank"

)

}



function openCloud(){

window.open(

"https://music.163.com",

"_blank"

)

}



function uploadMusic(
e
){

let file=

e.target.files[0]

if(
!file
)return


musicName.innerText=

file.name


audio.src=

URL.createObjectURL(
file
)

player.style.display=

"block"

}

</script>

</body>

</html>
