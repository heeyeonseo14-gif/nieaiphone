<!DOCTYPE html>

<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Music</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"Trebuchet MS";
}

body{

padding:22px;

min-height:100vh;

background:

linear-gradient(
180deg,
#F5EEFF,
#E6D8FA,
#D8C2F3
);

}

.title{

font-size:34px;

color:#4D4460;

margin-bottom:22px;

}

.card{

padding:22px;

margin-bottom:16px;

border-radius:32px;

background:

rgba(
255,
255,
255,
.18
);

backdrop-filter:

blur(40px);

}

.row{

display:flex;

justify-content:
space-between;

align-items:center;

}

.btn{

border:none;

padding:12px 18px;

border-radius:18px;

background:

#4A4257;

color:white;

}

.player{

margin-top:20px;

}

audio{

width:100%;

}

.name{

margin-bottom:12px;

color:#4D4460;

}

.now{

margin-top:18px;

font-size:14px;

color:#7A7288;

}

</style>

</head>

<body>



<div class="title">

Music

</div>



<div class="card">

<div class="row">

<div>

Spotify

</div>

<button
class="btn"

onclick="spotify()">

连接

</button>

</div>

</div>



<div class="card">

<div class="row">

<div>

网易云

</div>

<button
class="btn"

onclick="netease()">

连接

</button>

</div>

</div>



<div class="card">

<div>

我的音乐

</div>


<input

type="file"

accept="audio/*"

onchange="upload(event)">



<div
class="player">

<div
class="name"

id="musicName">

未播放

</div>


<audio

controls

id="audio"

></audio>



<div
class="now">

切换页面后继续播放

</div>


</div>

</div>



<script>

function spotify(){

window.open(

"https://open.spotify.com",

"_blank"

)

}



function netease(){

window.open(

"https://music.163.com",

"_blank"

)

}



function upload(
e
){

let file=

e.target.files[0]

if(
!file
)return


let url=

URL.createObjectURL(
file
)


audio.src=

url


musicName.innerText=

file.name


localStorage.setItem(

"musicName",

file.name

)

}


window.onload=

()=>{

let name=

localStorage.getItem(
"musicName"
)

if(
name
){

musicName.innerText=

name

}

}

</script>

</body>

</html>
