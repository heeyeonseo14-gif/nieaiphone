<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="./manifest.json">

<title>NIEaiphone · 聊天</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{

--bg1:#f4e8fb;
--bg2:#f0e7fb;

--text:#2f2436;
--muted:#8b7c9b;

--bubble-color:rgba(155,134,230,.35);

}

*{box-sizing:border-box}

html,body{
margin:0;
height:100%;
font-family:"Quicksand",system-ui;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
}

/* APP */

.app{
width:96%;
max-width:420px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
padding:14px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.header button{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:white;
font-size:18px;
}

.header h1{
flex:1;
text-align:center;
margin:0;
font-size:18px;
}

/* CHAT CARD */

.chatCard{
flex:1;
background-size:cover;
background-position:center;
background:white;
border-radius:18px;
display:flex;
flex-direction:column;
padding:14px;
}

/* MESSAGES */

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:120px;
}

/* MESSAGE */

.msgRow{
display:flex;
gap:8px;
align-items:flex-end;
}

.msgRow.me{justify-content:flex-end}
.msgRow.ai{justify-content:flex-start}

.avatar{
width:34px;
height:34px;
border-radius:50%;
object-fit:cover;
}

.msg{
max-width:70%;
padding:10px 12px;
border-radius:14px;
line-height:1.4;
font-size:14px;
backdrop-filter:blur(12px);
background:rgba(255,255,255,.35);
}

.msgRow.me .msg{
background:var(--bubble-color);
}

/* ★新增：时间 */

.msgTime{
font-size:11px;
color:#999;
text-align:center;
margin:6px 0;
}

/* INPUT */

.composer{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:420px;
margin:auto;
display:flex;
gap:8px;
padding:10px;
background:white;
border-top:1px solid #eee;
padding-bottom:calc(10px + env(safe-area-inset-bottom));
}

.composer textarea{
flex:1;
border-radius:14px;
padding:10px;
border:1px solid #e6def5;
max-height:120px;
min-height:40px;
}

.sendBtn{
width:54px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#b8a6ff,#8f7be8);
color:white;
}

.plusBtn{
width:42px;
border:none;
border-radius:14px;
background:#f2ecff;
color:#7c68e6;
font-size:22px;
}

/* MODAL */

.modalMask{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
z-index:99;
}

.modal{
background:white;
width:92%;
max-width:380px;
border-radius:20px;
padding:16px;
}

.modal h3{
text-align:center;
margin:0 0 12px;
}

.modal label{
font-size:13px;
color:var(--muted);
margin-top:10px;
display:block;
}

.modal input,.modal textarea,.modal select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #e6def5;
}

.modal textarea{resize:none}

.modalActions{
display:flex;
gap:10px;
margin-top:14px;
}

.modalActions button{
flex:1;
padding:12px;
border-radius:999px;
border:none;
font-weight:700;
}

.cancel{background:#f2eefc}

.save{
background:linear-gradient(135deg,#9b8cff,#7c68e6);
color:white;
}

/* ACTION MENU */

.actionGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.actionItem{
text-align:center;
font-size:13px;
cursor:pointer;
}

.actionIcon{
width:60px;
height:60px;
background:#f2ecff;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-weight:600;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<button onclick="location.href='chat.html'">←</button>

<h1 id="chatTitle">聊天</h1>

<button onclick="openPersona()">⚙</button>

</div>

<div class="chatCard">

<div class="messages" id="messages"></div>

</div>

</div>

<div class="composer">

<button class="plusBtn" onclick="openAction()">＋</button>

<textarea id="input" placeholder="输入消息…"></textarea>

<button class="sendBtn" id="sendBtn">➤</button>

</div>

<!-- 人设设定 -->

<div class="modalMask" id="personaModal">

<div class="modal">

<h3>人设设定</h3>

<label>AI名称</label>
<input id="p_name">

<label>性别</label>
<select id="p_gender">
<option>中性</option>
<option>男性</option>
<option>女性</option>
</select>

<label>人设</label>
<textarea id="p_persona"></textarea>

<label>关联世界书</label>
<select id="p_worldbook"></select>

<label>聊天背景</label>
<input type="file" id="bgUpload">

<label>聊天气泡颜色</label>
<input type="color" id="bubbleColor">

<div class="modalActions">
<button class="cancel" onclick="closePersona()">取消</button>
<button class="save" onclick="savePersona()">保存</button>
</div>

</div>
</div>

<!-- 聊天功能 -->

<div class="modalMask" id="actionModal">

<div class="modal">

<h3 style="text-align:center;margin:0 0 12px">聊天功能</h3>

<div class="actionGrid">

<div class="actionItem"><div class="actionIcon">相册</div></div>
<div class="actionItem"><div class="actionIcon">拍摄</div></div>
<div class="actionItem"><div class="actionIcon">视频</div></div>
<div class="actionItem"><div class="actionIcon">语音</div></div>

<div class="actionItem"><div class="actionIcon">位置</div></div>
<div class="actionItem"><div class="actionIcon">红包</div></div>
<div class="actionItem"><div class="actionIcon">礼物</div></div>
<div class="actionItem"><div class="actionIcon">转账</div></div>

</div>

</div>
</div>

<script>

/* ===== 参数 ===== */

const params=new URLSearchParams(location.search)
const CHAT_ID=params.get("cid")

const CHAT_KEY="chat_"+CHAT_ID
const PERSONA_KEY="persona_"+CHAT_ID

/* ★新增：头像同步 */

const contacts=JSON.parse(localStorage.getItem("nie_contacts_v1")||"[]")
const contact=contacts.find(c=>String(c.id)===String(CHAT_ID))||{}
const aiAvatar=contact.avatar||""

const myProfile=JSON.parse(localStorage.getItem("nie_user_global")||"{}")
const myAvatar=myProfile.avatar||""

/* ★新增：加载人设 */

(function(){

const p=JSON.parse(localStorage.getItem(PERSONA_KEY)||"{}")

if(p.name) p_name.value=p.name
if(p.gender) p_gender.value=p.gender
if(p.persona) p_persona.value=p.persona

if(p.name) chatTitle.textContent=p.name

})();

/* ===== modal ===== */

function openPersona(){
personaModal.style.display="flex"
}

function closePersona(){
personaModal.style.display="none"
}

function openAction(){
actionModal.style.display="flex"
}

actionModal.onclick=e=>{
if(e.target===actionModal)actionModal.style.display="none"
}

/* ===== 人设保存 ===== */

function savePersona(){

localStorage.setItem(PERSONA_KEY,JSON.stringify({

name:p_name.value,
gender:p_gender.value,
persona:p_persona.value,
worldbook:p_worldbook.value

}))

chatTitle.textContent=p_name.value||"聊天"

closePersona()

}

/* ===== 聊天背景 ===== */

const BG_KEY="chat_bg_"+CHAT_ID

bgUpload.onchange=e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(ev){

localStorage.setItem(BG_KEY,ev.target.result)

applyBg()

}

reader.readAsDataURL(file)

}

function applyBg(){

const bg=localStorage.getItem(BG_KEY)

if(bg){

document.querySelector(".chatCard").style.backgroundImage="url("+bg+")"

}

}

applyBg()

/* ===== 气泡颜色 ===== */

const COLOR_KEY="bubble_color_"+CHAT_ID

bubbleColor.oninput=e=>{

const c=e.target.value

document.documentElement.style.setProperty("--bubble-color",c+"55")

localStorage.setItem(COLOR_KEY,c)

}

const savedColor=localStorage.getItem(COLOR_KEY)

if(savedColor){

document.documentElement.style.setProperty("--bubble-color",savedColor+"55")

}

/* ===== API ===== */

function getApiConfig(){

return JSON.parse(localStorage.getItem("nie_api_config_v1")||"null")

}

async function callApi(messages){

const api=getApiConfig()

const res=await fetch(api.baseUrl+"/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+api.apiKey
},

body:JSON.stringify({

model:api.model,
messages

})

})

const data=await res.json()

return data.choices[0].message.content

}

/* ★新增：AI拆分消息 */

function splitReply(text){

return text.split(/(?<=[。！？])/).map(t=>t.trim()).filter(Boolean)

}

/* ===== 渲染聊天 ===== */

const messagesEl=document.getElementById("messages")

function render(){

messagesEl.innerHTML=""

const list=JSON.parse(localStorage.getItem(CHAT_KEY)||"[]")

let lastTime=0

list.forEach(m=>{

if(m.time && m.time-lastTime>300000){

const time=document.createElement("div")
time.className="msgTime"
time.innerText=new Date(m.time).toLocaleTimeString()

messagesEl.appendChild(time)

}

lastTime=m.time||Date.now()

const row=document.createElement("div")

row.className="msgRow "+m.type

row.innerHTML=`

${m.type==="ai"?`<img class="avatar" src="${aiAvatar}">`:""}

<div class="msg">${m.text}</div>

${m.type==="me"?`<img class="avatar" src="${myAvatar}">`:""}

`

messagesEl.appendChild(row)

})

messagesEl.scrollTop=messagesEl.scrollHeight

}

render()

/* ===== 发送消息 ===== */

sendBtn.onclick=async()=>{

if(!input.value.trim())return

const text=input.value

input.value=""

const list=JSON.parse(localStorage.getItem(CHAT_KEY)||"[]")

list.push({type:"me",text,time:Date.now()})

localStorage.setItem(CHAT_KEY,JSON.stringify(list))

render()

const persona=JSON.parse(localStorage.getItem(PERSONA_KEY)||"{}")

const msgs=[

{role:"system",content:persona.persona||""},

{role:"user",content:text}

]

chatTitle.textContent="对方正在输入..."

const reply=await callApi(msgs)

const parts=splitReply(reply)

for(let i=0;i<parts.length;i++){

await new Promise(r=>setTimeout(r,700))

const list=JSON.parse(localStorage.getItem(CHAT_KEY)||"[]")

list.push({type:"ai",text:parts[i],time:Date.now()})

localStorage.setItem(CHAT_KEY,JSON.stringify(list))

render()

}

chatTitle.textContent=persona.name||"聊天"

}

/* ★新增：AI主动聊天 */

function aiAutoMessage(){

setTimeout(async()=>{

try{

const persona=JSON.parse(localStorage.getItem(PERSONA_KEY)||"{}")

const msgs=[

{role:"system",content:persona.persona||"主动聊天"},

{role:"user",content:"主动开启聊天"}

]

const reply=await callApi(msgs)

const parts=splitReply(reply)

parts.forEach((p,i)=>{

setTimeout(()=>{

const list=JSON.parse(localStorage.getItem(CHAT_KEY)||"[]")

list.push({type:"ai",text:p,time:Date.now()})

localStorage.setItem(CHAT_KEY,JSON.stringify(list))

render()

},900*i)

})

}catch(e){console.log(e)}

},20000+Math.random()*20000)

}

aiAutoMessage()

</script>

</body>
</html>
